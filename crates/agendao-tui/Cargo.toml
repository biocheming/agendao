[package]
name = "agendao-tui"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true

[dependencies]
# Workspace dependencies
agendao-client = { path = "../agendao-client" }
agendao-core = { path = "../agendao-core" }
agendao-orchestrator = { path = "../agendao-orchestrator" }
agendao-util = { path = "../agendao-util" }
agendao-config = { path = "../agendao-config" }
agendao-multimodal = { path = "../agendao-multimodal" }
agendao-voice = { path = "../agendao-voice" }
agendao-provider = { path = "../agendao-provider" }
agendao-server = { path = "../agendao-server" }
agendao-session = { path = "../agendao-session" }
agendao-skill = { path = "../agendao-skill" }
agendao-agent = { path = "../agendao-agent" }
agendao-tool = { path = "../agendao-tool" }
agendao-mcp = { path = "../agendao-mcp" }
agendao-command = { path = "../agendao-command" }
agendao-runtime-context = { path = "../agendao-runtime-context" }
agendao-state = { path = "../agendao-state" }
agendao-types = { path = "../agendao-types" }
tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
anyhow = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
