[package]
name = "agendao-tool-core"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true

[features]
default = []
lsp = ["agendao-lsp", "lsp-types"]

[dependencies]
agendao-config = { path = "../agendao-config" }
agendao-execution-types = { path = "../agendao-execution-types" }
agendao-permission = { path = "../agendao-permission" }
agendao-types = { path = "../agendao-types" }
agendao-lsp = { path = "../agendao-lsp", optional = true }
lsp-types = { version = "0.97", optional = true }
tokio = { version = "1", features = ["sync"] }
tokio-util = { version = "0.7", features = ["rt"] }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
async-trait = { workspace = true }
url = { workspace = true }
uuid = { workspace = true }

