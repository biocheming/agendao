[package]
name = "agendao-tui-revue"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "AgenDao TUI frontend built with Revue — Vue-style reactive terminal UI"

[dependencies]
revue = { path = "../../../revue", features = ["markdown"] }
agendao-client = { path = "../agendao-client" }
agendao-command-render = { path = "../agendao-command-render" }
agendao-server-core = { path = "../agendao-server-core" }
agendao-types = { path = "../agendao-types" }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "sync"] }
tokio-util = { version = "0.7", optional = true }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"
dirs = "6"
futures = "0.3"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls-webpki-roots"] }
reqwest-eventsource = "0.6"
url = "2"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
agendao-server-local = { path = "../agendao-server-local", optional = true }

[features]
default = ["local-server"]
local-server = ["dep:agendao-server-local", "dep:tokio-util"]
