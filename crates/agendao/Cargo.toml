[package]
name = "agendao"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true

[features]
default = ["product-shell"]
product-shell = [
    "dep:agendao-cli",
    "agendao-cli/interactive",
    "agendao-cli/local-server",
    "dep:agendao-client",
    "dep:agendao-launcher",
    "agendao-launcher/embedded-web",
    "dep:agendao-server",
    "agendao-server/http",
    "agendao-server/ws",
    "agendao-server/pty",
    "agendao-server/mcp",
    "dep:agendao-tui",
    "agendao-tui/remote-stream",
    "agendao-tui/voice",
    "agendao-tui/multimodal",
    "agendao-tui/local-server",
    "dep:clap",
    "dep:dirs",
    "dep:reqwest",
    "dep:tracing-subscriber",
    "dep:which",
]
product-cli-bin = [
    "dep:agendao-cli",
    "agendao-cli/interactive",
    "agendao-cli/local-server",
    "dep:dirs",
    "dep:tracing-subscriber",
]
product-tui-bin = [
    "dep:agendao-tui",
    "agendao-tui/remote-stream",
    "agendao-tui/voice",
    "agendao-tui/multimodal",
    "dep:dirs",
    "dep:tracing-subscriber",
]
product-serve-bin = [
    "dep:agendao-launcher",
    "agendao-launcher/embedded-web",
    "dep:agendao-server",
    "agendao-server/http",
    "agendao-server/ws",
    "agendao-server/pty",
    "agendao-server/mcp",
    "dep:clap",
    "dep:dirs",
    "dep:tracing-subscriber",
]

[[bin]]
name = "agendao"
path = "src/main.rs"
required-features = ["product-shell"]

[[bin]]
name = "agendao-product-cli"
path = "src/bin/agendao-product-cli.rs"
required-features = ["product-cli-bin"]

[[bin]]
name = "agendao-product-tui"
path = "src/bin/agendao-product-tui.rs"
required-features = ["product-tui-bin"]

[[bin]]
name = "agendao-product-serve"
path = "src/bin/agendao-product-serve.rs"
required-features = ["product-serve-bin"]

[dependencies]
agendao-cli = { path = "../agendao-cli", optional = true, default-features = false }
agendao-client = { path = "../agendao-client", optional = true }
agendao-launcher = { path = "../agendao-launcher", optional = true }
agendao-server = { path = "../agendao-server", optional = true, default-features = false }
agendao-tui = { path = "../agendao-tui", optional = true, default-features = false }
tokio = { version = "1", features = ["macros", "process", "rt", "rt-multi-thread", "time"] }
anyhow = { workspace = true }
async-trait = { workspace = true }
clap = { version = "4", optional = true, features = ["derive"] }
dirs = { workspace = true, optional = true }
reqwest = { version = "0.12", optional = true, default-features = false, features = ["charset", "http2", "json", "rustls-tls-webpki-roots", "system-proxy"] }
serde_json = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { version = "0.3", optional = true, features = ["env-filter"] }
which = { version = "7", optional = true }

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt"] }
