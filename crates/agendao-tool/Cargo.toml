[package]
name = "agendao-tool"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true

[features]
default = ["code-intel", "terminal-tools", "web-tools", "blocking-http"]
lsp = ["agendao-tool-core/lsp", "agendao-lsp", "lsp-types"]
code-intel = ["dep:ast-grep-core", "dep:ast-grep-language", "dep:ast-grep-config"]
terminal-tools = ["dep:portable-pty"]
blocking-http = ["dep:reqwest"]
web-tools = ["dep:agendao-tool-web"]

[dependencies]
agendao-tool-core = { path = "../agendao-tool-core" }
agendao-core = { path = "../agendao-core", features = ["process-registry", "agent-task-registry"] }
agendao-config = { path = "../agendao-config" }
agendao-skill = { path = "../agendao-skill" }
agendao-types = { path = "../agendao-types" }
agendao-util = { path = "../agendao-util" }
agendao-grep = { path = "../agendao-grep" }
agendao-plugin = { path = "../agendao-plugin" }
agendao-permission = { path = "../agendao-permission" }
agendao-execution-types = { path = "../agendao-execution-types" }
agendao-tool-web = { path = "../agendao-tool-web", optional = true }
agendao-lsp = { path = "../agendao-lsp", optional = true }
lsp-types = { version = "0.97", optional = true }
tokio = { version = "1", features = ["fs", "io-util", "net", "process", "rt", "sync", "time"] }
tokio-util = { version = "0.7", features = ["rt"] }
serde = { workspace = true }
serde_json = { workspace = true }
anyhow = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
async-trait = { workspace = true }
futures = { workspace = true }
regex = { workspace = true }
glob = { workspace = true }
ignore = "0.4"
crossbeam-channel = "0.5"
walkdir = "2"
dirs = { workspace = true }
chrono = { workspace = true }
which = "7"
content_inspector = "0.2"
reqwest = { version = "0.12", default-features = false, features = ["blocking", "rustls-tls-webpki-roots", "system-proxy"], optional = true }
url = { workspace = true }
uuid = { workspace = true }
ast-grep-core = { version = "0.41.0", optional = true }
ast-grep-language = { version = "0.41.0", optional = true }
ast-grep-config = { version = "0.41.0", optional = true }
urlencoding = "2.1"
base64 = "0.22"
portable-pty = { version = "0.8", optional = true }

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt"] }
tempfile = "3"
